  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --emerald-dark: #196716;
      --emerald-mid: #289527;
      --cream: #F5F0E8;
      --cream-dark: #DDD4C0;
      --near-black: #0D0D0D;
      --dark-gray-green: #3A4A3D;
      --warm-taupe: #7A6E62;
      --title-cream: #E1D9CB;
      --serif: 'Merriweather', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--serif);
      font-weight: 300;
      background: var(--cream);
      color: var(--near-black);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      max-width: 1200px;
      margin: 0 auto;
    }

    a { text-decoration: none; color: inherit; }

    /* LILY */
    .page-lily {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120vh;
      height: 120vh;
      opacity: 0.015;
      pointer-events: none;
      z-index: 0;
    }
    .page-lily svg { width: 100%; height: 100%; }
    nav, main, footer { position: relative; z-index: 1; }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 4rem;
      border-bottom: 0.5px solid rgba(27,30,29,0.15);
      position: sticky;
      top: 0;
      background: var(--cream);
      z-index: 100;
    }
    .nav-logo { font-size: 12px; letter-spacing: 0.08em; font-style: italic; color: var(--near-black); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 12px; letter-spacing: 0.05em; color: var(--dark-gray-green); transition: color 0.2s; font-weight: 300; }
    .nav-links a:hover { color: var(--near-black); }
    .nav-links a.active { color: var(--near-black); border-bottom: 0.5px solid var(--near-black); padding-bottom: 1px; }

    /* MAIN */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 7rem 4rem 8rem;
    }

    .content-col {
      max-width: 660px;
    }

    .contact-line {
      font-size: 17px;
      font-weight: 300;
      line-height: 2;
      color: var(--near-black);
    }

    .contact-email {
      color: var(--emerald-dark);
      text-decoration: none;
      border-bottom: 0.5px solid var(--emerald-dark);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact-email:hover {
      color: var(--near-black);
      border-color: var(--near-black);
    }

    /* FOOTER */
    footer {
      padding: 2.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      border-top: 0.5px solid rgba(27,30,29,0.15);
    }
    .footer-follow { font-size: 16px; font-weight: 400; letter-spacing: 0.01em; color: #0D0D0D; margin-bottom: 0.5rem; }
    .footer-socials { display: flex; align-items: center; gap: 2rem; }
    .footer-social { font-size: 14px; font-weight: 300; letter-spacing: 0.02em; color: var(--near-black); transition: opacity 0.2s; display: flex; align-items: center; gap: 7px; }
    .footer-social:hover { opacity: 0.7; }
    .footer-bottom { width: 100%; display: flex; justify-content: center; align-items: center; padding-top: 1.5rem; border-top: 0.5px solid rgba(27,30,29,0.12); }
    .footer-copy { font-size: 10px; letter-spacing: 0.04em; color: var(--warm-taupe); font-weight: 300; }

    @media (max-width: 768px) {
      nav { padding: 1.25rem 1.5rem; }
      .nav-links { display: none; }
      main { padding: 4rem 1.5rem 6rem; }
      .content-col { max-width: 100%; }
      .contact-line { font-size: 16px; }
      footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      .footer-socials { flex-direction: column; align-items: center; gap: 1rem; }
    }
  </style>
</head>
